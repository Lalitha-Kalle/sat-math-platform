services:
  - type: web
    name: sat-math-platform
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/seed_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
